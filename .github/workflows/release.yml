name: Release

# Tag-triggered publish. Push a tag like `v0.1.0` to build + upload to PyPI, or
# run manually (workflow_dispatch): `target: none` builds + smoke-tests without
# uploading; `target: testpypi` also uploads to TestPyPI for a dry run.
#
# Publishes THREE PyPI projects from one tag:
#   - klayout-klink        (one universal py3-none-any wheel; depends on BOTH kernels)
#   - klink-boxmaze-rs     (single-stack P&R kernel; platform wheels; runtime dep)
#   - klink-trackmaze-rs   (multilayer P&R kernel; platform wheels; runtime dep)
# klayout-klink declares BOTH kernels as runtime dependencies, so
# `pip install klayout-klink` pulls klink + both Rust accelerators together. They
# are speed-only (pure-Python fallbacks exist); use
# `pip install klayout-klink --no-deps` to install the pure-Python core alone
# when you cannot fetch/build a kernel wheel.
#
# BEFORE THE FIRST PUBLISH (maintainer setup, one-time):
#   Publishing uses PyPI Trusted Publishing (OIDC) — no API token needed.
#   Add a "pending publisher" (GitHub) once per project name (klayout-klink,
#   klink-boxmaze-rs, klink-trackmaze-rs), owner/repo = klinkdev2026/klayout-klink,
#   workflow = release.yml, environment blank. Pending publishers also reserve
#   the names. Do it on BOTH indexes:
#     - test.pypi.org  -> for the `target: testpypi` dry run below
#     - pypi.org       -> for the real tag-triggered publish
#   Recommended flow: run `target: testpypi` once, verify with
#   `pip install -i https://test.pypi.org/simple/ klayout-klink`, THEN tag v0.1.0.
# Only tag from a green `main` (the rust-build CI gates the kernel build per OS).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Manual run target: 'none' = build + smoke only; 'testpypi' = also upload to TestPyPI."
        type: choice
        options: [none, testpypi]
        default: none

jobs:
  build-main:
    name: build pure-Python core (sdist + universal wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: dist/*

  build-accel:
    name: build ${{ matrix.crate }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-15-intel]
        crate: [klink_boxmaze, klink_trackmaze]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels (py3.10-3.13) with maturin
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -m rust/${{ matrix.crate }}/Cargo.toml --interpreter 3.10 3.11 3.12 3.13
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.crate }}-${{ matrix.os }}
          path: dist/*

  install-smoke:
    # Prove the WHOLE vision before publishing: a clean env `pip install
    # klayout-klink` off the just-built wheels pulls klink + BOTH Rust kernels in
    # one shot, imports, and `klink init` scaffolds a usable agent project --
    # across every OS x Python we ship.
    name: pip-install one-shot (${{ matrix.os }}, py${{ matrix.python }})
    needs: [build-main, build-accel]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-15-intel]
        python: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: pip install klayout-klink (core + both Rust kernels) from the built wheels
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links dist klayout-klink
      - name: one-shot import (klink + both kernels) then klink init a project
        run: |
          python -c "import klink, klink.mcp, klink_boxmaze_rs, klink_trackmaze_rs; print('one-shot install ok:', klink.__version__)"
          klink init smoke_proj
          python -c "import os,sys; sys.exit(0 if os.path.isdir(os.path.join('smoke_proj','example_template')) else 1)"

  publish-testpypi:
    name: publish to TestPyPI (dry run)
    needs: [build-main, build-accel, install-smoke]
    runs-on: ubuntu-latest
    # Manual dry run only: Actions -> Release -> Run workflow -> target: testpypi.
    # Needs the 3 pending publishers on test.pypi.org (see header).
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish all wheels + sdist to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          repository-url: https://test.pypi.org/legacy/

  publish:
    name: publish to PyPI
    needs: [build-main, build-accel, install-smoke]
    runs-on: ubuntu-latest
    # Only on a real version tag; manual runs build (and optionally hit TestPyPI)
    # but never publish to real PyPI.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      # PyPI Trusted Publishing (OIDC): all three project names must list this
      # repo + workflow as a (pending) publisher on pypi.org.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Publish all wheels + sdist to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
