name: Release

# Tag-triggered publish. Push a tag like `v0.1.0` to build + upload to PyPI, or
# run manually (workflow_dispatch): `target: none` builds + smoke-tests without
# uploading; `target: testpypi` also uploads to TestPyPI for a dry run.
#
# Publishes THREE PyPI projects from one tag:
#   - klayout-klink        (one universal py3-none-any wheel; depends on BOTH kernels)
#   - klink-boxmaze-rs     (single-stack P&R kernel; platform wheels; runtime dep)
#   - klink-trackmaze-rs   (multilayer P&R kernel; platform wheels; runtime dep)
# klayout-klink declares BOTH kernels as runtime dependencies, so
# `pip install klayout-klink` pulls klink + both Rust accelerators together. They
# are speed-only (pure-Python fallbacks exist); use
# `pip install klayout-klink --no-deps` to install the pure-Python core alone
# when you cannot fetch/build a kernel wheel.
#
# BEFORE THE FIRST PUBLISH (maintainer setup, one-time):
#   Publishing uses PyPI Trusted Publishing (OIDC) — no API token needed. Add a
#   "pending publisher" (GitHub) for EACH project (one form submission each),
#   owner/repo = klinkdev2026/klayout-klink, workflow = release.yml, and a
#   DISTINCT environment per project. The distinct environment is what lets all
#   three coexist: PyPI keys a pending publisher on owner/repo/workflow/
#   environment, so three projects with a shared blank environment collide.
#     project name        ->  environment name
#     klayout-klink        ->  pypi-klayout-klink
#     klink-boxmaze-rs     ->  pypi-klink-boxmaze-rs
#     klink-trackmaze-rs   ->  pypi-klink-trackmaze-rs
#   Do it on BOTH indexes: test.pypi.org (for `target: testpypi`) and pypi.org
#   (for the real tag publish).
#   NOTE: a pending publisher only AUTHORIZES the upload; it does NOT reserve the
#   name — the name is created on the FIRST successful publish, so publish
#   promptly to secure the three names.
#   Recommended flow: run `target: testpypi` once, verify with
#   `pip install -i https://test.pypi.org/simple/ klayout-klink`, THEN tag v0.1.0.
# Only tag from a green `main` (the rust-build CI gates the kernel build per OS).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Manual run target: 'none' = build + smoke only; 'testpypi' = also upload to TestPyPI."
        type: choice
        options: [none, testpypi]
        default: none

jobs:
  build-main:
    name: build pure-Python core (sdist + universal wheel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist-core
          path: dist/*

  build-accel:
    name: build ${{ matrix.crate }} (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-15-intel]
        crate: [klink_boxmaze, klink_trackmaze]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build abi3 wheel with maturin
        # The kernels target the abi3 stable ABI (pyo3 feature abi3-py310):
        # ONE wheel per platform covers CPython 3.10 and every newer release,
        # including versions that did not exist at build time — no
        # per-interpreter matrix.
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist -m rust/${{ matrix.crate }}/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.crate }}-${{ matrix.os }}
          path: dist/*

  install-smoke:
    # Prove the WHOLE vision before publishing: a clean env `pip install
    # klayout-klink` off the just-built wheels pulls klink + BOTH Rust kernels in
    # one shot, imports, and `klink init` scaffolds a usable agent project --
    # across every OS x Python we ship.
    name: pip-install one-shot (${{ matrix.os }}, py${{ matrix.python }})
    needs: [build-main, build-accel]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14, macos-15-intel]
        # 3.14 has no dedicated kernel build — it exercises the abi3 promise
        # (the cp310-abi3 wheel must install and import on newer CPythons).
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: pip install klayout-klink (core + both Rust kernels) from the built wheels
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links dist klayout-klink
      - name: one-shot import (klink + both kernels) then klink init a project
        run: |
          python -c "import klink, klink.mcp, klink_boxmaze_rs, klink_trackmaze_rs; print('one-shot install ok:', klink.__version__)"
          klink init smoke_proj
          python -c "import os,sys; sys.exit(0 if os.path.isdir(os.path.join('smoke_proj','example_template')) else 1)"

  # One PUBLISH JOB PER PROJECT, each under its own GitHub environment. PyPI keys
  # a *pending* publisher on (owner, repo, workflow, environment), so three
  # projects sharing a blank environment collide -- you can only register one
  # pending publisher at a time. Distinct environments make the three tuples
  # unique, so you register all three pending publishers up front and one run
  # publishes all three. Each job uploads ONLY its own project's files.
  publish-testpypi:
    name: publish ${{ matrix.project }} to TestPyPI (dry run)
    needs: [build-main, build-accel, install-smoke]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: klayout-klink,      glob: "klayout_klink-*",      environment: pypi-klayout-klink }
          - { project: klink-boxmaze-rs,   glob: "klink_boxmaze_rs-*",   environment: pypi-klink-boxmaze-rs }
          - { project: klink-trackmaze-rs, glob: "klink_trackmaze_rs-*", environment: pypi-klink-trackmaze-rs }
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: all_dist, merge-multiple: true }
      - name: isolate ${{ matrix.project }} files
        run: mkdir pkg && cp all_dist/${{ matrix.glob }} pkg/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pkg
          skip-existing: true
          repository-url: https://test.pypi.org/legacy/

  publish:
    name: publish ${{ matrix.project }} to PyPI
    needs: [build-main, build-accel, install-smoke]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { project: klayout-klink,      glob: "klayout_klink-*",      environment: pypi-klayout-klink }
          - { project: klink-boxmaze-rs,   glob: "klink_boxmaze_rs-*",   environment: pypi-klink-boxmaze-rs }
          - { project: klink-trackmaze-rs, glob: "klink_trackmaze_rs-*", environment: pypi-klink-trackmaze-rs }
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { path: all_dist, merge-multiple: true }
      - name: isolate ${{ matrix.project }} files
        run: mkdir pkg && cp all_dist/${{ matrix.glob }} pkg/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pkg
          skip-existing: true
